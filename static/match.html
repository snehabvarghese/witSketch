<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Match - WitSketch</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=3">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>

<body>
    <div id="nav-placeholder"></div>

    <div class="main-content">
        <h1>Database Match</h1>
        <p class="subtitle">Identify suspects from the criminal database.</p>

        <div class="panel match-upload-panel">
            <div class="upload-area" id="dropZone">
                <ion-icon name="cloud-upload-outline"></ion-icon>
                <p>Drag & Drop Sketch or Click to Upload</p>
                <input type="file" id="matchFile" accept="image/*" class="hidden">
            </div>

            <div id="previewContainer" class="hidden">
                <img id="previewImg" src="">
                <button id="matchActionBtn" class="primary-btn">Analyze Biometrics</button>
            </div>
        </div>

        <!-- Results List -->
        <div id="matchList" class="results-grid hidden">
            <!-- Populated dynamically -->
        </div>
    </div>

    <script src="/static/nav.js?v=3"></script>

    <!-- Details Modal -->
    <div id="detailModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;
         display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;
         transition:opacity 0.2s" class="">
        <div style="background:#1e1e2e;border-radius:20px;padding:2rem;max-width:580px;width:90%;
                    display:grid;grid-template-columns:180px 1fr;gap:1.5rem;position:relative;
                    max-height:90vh;overflow-y:auto">
            <button onclick="closeModal()" style="position:absolute;top:1rem;right:1rem;
                    background:none;border:none;color:#888;font-size:1.4rem;cursor:pointer">✕</button>
            <div id="mImg"></div>
            <div>
                <h2 id="mName" style="font-size:1.3rem;font-weight:700;margin-bottom:0.75rem">—</h2>
                <table style="font-size:0.85rem;border-collapse:collapse;width:100%">
                    <tr>
                        <td style="color:#888;padding:4px 8px 4px 0;white-space:nowrap">ID</td>
                        <td style="font-weight:600" id="mId">—</td>
                    </tr>
                    <tr>
                        <td style="color:#888;padding:4px 8px 4px 0">Age</td>
                        <td style="font-weight:600" id="mAge">—</td>
                    </tr>
                    <tr>
                        <td style="color:#888;padding:4px 8px 4px 0">Crime</td>
                        <td style="font-weight:600;color:#fa8072" id="mCrime">—</td>
                    </tr>
                    <tr>
                        <td style="color:#888;padding:4px 8px 4px 0">Sentence</td>
                        <td style="font-weight:600" id="mSentence">—</td>
                    </tr>
                    <tr>
                        <td style="color:#888;padding:4px 8px 4px 0">Risk</td>
                        <td><span id="mRisk" style="display:inline-block;padding:2px 8px;
                            border-radius:4px;font-size:0.75rem;font-weight:700">—</span></td>
                    </tr>
                    <tr>
                        <td style="color:#888;padding:4px 8px 4px 0">Similarity</td>
                        <td style="font-weight:600;color:#a78bfa" id="mScore">—</td>
                    </tr>
                </table>
                <div style="margin-top:1rem">
                    <div style="font-size:0.75rem;color:#888;margin-bottom:4px">Attributes on file:</div>
                    <div id="mAttrs"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('matchFile');
        const previewImg = document.getElementById('previewImg');
        const previewContainer = document.getElementById('previewContainer');
        const matchList = document.getElementById('matchList');

        // Store match results so modal can access them
        let matchResults = [];

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) showPreview(file);
        });

        function showPreview(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewContainer.classList.remove('hidden');
                dropZone.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('matchActionBtn').addEventListener('click', async () => {
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);

            matchList.innerHTML = '<div class="loader"></div>';
            matchList.classList.remove('hidden');

            try {
                const resp = await fetch('/match', {
                    method: 'POST',
                    body: formData
                });
                const data = await resp.json();
                matchResults = data.results || [];
                displayMatches(matchResults);
            } catch (err) {
                alert('Match failed');
                matchList.innerHTML = '';
            }
        });

        function displayMatches(results) {
            matchList.innerHTML = '';

            if (!results || results.length === 0) {
                matchList.innerHTML = '<p>No matches found.</p>';
                return;
            }

            results.forEach((item, index) => {
                const rec = item.match;
                const scorePct = Math.round(item.score * 100);

                const imgHtml = item.sketch_image
                    ? `<img src="${item.sketch_image}" alt="Suspect">`
                    : '<div style="width:100%;height:100%;background:#111;display:flex;align-items:center;justify-content:center;color:#555;font-size:0.75rem">No image</div>';

                const card = document.createElement('div');
                card.className = 'match-card-item';
                card.innerHTML = `
                    <div class="match-rank">#${index + 1}</div>
                    <div class="match-photo">
                        ${imgHtml}
                        <div class="similarity-badge">${scorePct}% Match</div>
                    </div>
                    <div class="match-info">
                        <h3>${rec.name}</h3>
                        <div class="progress-bar">
                            <div class="fill" style="width: ${scorePct}%"></div>
                        </div>
                        <p class="detail">ID: ${rec.id || 'N/A'} &middot; Age: ${rec.age || 'N/A'}</p>
                        <p class="detail">Crime: ${rec.crime} &middot; Sentence: ${rec.sentence || '—'}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem;">
                            <div class="risk-tag" style="margin-top: 0;">${rec.risk_level} Risk</div>
                            <button class="small-btn" onclick="openModal(${index})">View Details</button>
                        </div>
                    </div>
                `;
                matchList.appendChild(card);
            });

            matchList.classList.remove('hidden');
        }

        function openModal(idx) {
            const item = matchResults[idx];
            if (!item) return;
            const rec = item.match;
            const scorePct = Math.round(item.score * 100);

            let attrsHtml = '<span style="color:#666;font-size:0.8rem">No attribute data</span>';
            try {
                const attrs = rec.attributes || {};
                if (Object.keys(attrs).length > 0) {
                    attrsHtml = Object.entries(attrs).map(([k, v]) => {
                        const keyStr = String(k).replace(/_/g, ' ');
                        const valStr = String(v);
                        return `<span style="display:inline-block;background:#2a2a3a;border-radius:4px;padding:2px 7px;font-size:0.72rem;margin:2px;color:#c4b5fd">${keyStr}: <b>${valStr}</b></span>`;
                    }).join('');
                }
            } catch (e) { console.error(e); }

            document.getElementById('mImg').innerHTML = item.sketch_image
                ? `<img src="${item.sketch_image}" alt="${rec.name}" style="width:180px;border-radius:12px;object-fit:cover">`
                : `<div style="width:180px;height:180px;background:#111;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#555">No image</div>`;

            document.getElementById('mName').textContent = rec.name || 'Unknown';
            document.getElementById('mId').textContent = rec.id || '—';
            document.getElementById('mAge').textContent = rec.age || '—';
            document.getElementById('mCrime').textContent = rec.crime || '—';
            document.getElementById('mSentence').textContent = rec.sentence || '—';
            document.getElementById('mScore').textContent = scorePct + '%';

            const riskEl = document.getElementById('mRisk');
            const rLevel = rec.risk_level || 'Unknown';
            riskEl.textContent = rLevel + ' Risk';
            riskEl.style.background = rLevel === 'Low' ? 'rgba(16,185,129,0.2)'
                : rLevel === 'Medium' ? 'rgba(251,191,36,0.2)' : 'rgba(239,68,68,0.2)';
            riskEl.style.color = rLevel === 'Low' ? '#86efac'
                : rLevel === 'Medium' ? '#fbbf24' : '#ef4444';

            document.getElementById('mAttrs').innerHTML = attrsHtml;

            document.getElementById('detailModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        document.getElementById('detailModal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        window.openModal = openModal;
        window.closeModal = closeModal;
    </script>
    <style>
        .match-upload-panel {
            text-align: center;
            border: 2px dashed #334155;
            padding: 3rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .match-upload-panel:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-area ion-icon {
            font-size: 3rem;
            color: #94a3b8;
        }

        #previewContainer {
            text-align: center;
        }

        #previewImg {
            max-height: 300px;
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .results-grid {
            margin-top: 3rem;
            display: grid;
            gap: 1rem;
        }

        .match-card-item {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            position: relative;
            animation: slideIn 0.5s ease-out;
            backdrop-filter: blur(10px);
        }

        .match-rank {
            font-size: 2rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.1);
        }

        .match-photo {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        .match-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .match-info {
            flex: 1;
        }

        .match-info h3 {
            margin: 0;
            font-size: 1.2rem;
            display: inline-block;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 0.5rem 0 0.5rem 0;
            overflow: hidden;
            width: 100%;
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary));
            border-radius: 4px;
        }

        .detail {
            margin: 0.2rem 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .risk-tag {
            display: inline-block;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            border: 1px solid rgba(239, 68, 68, 0.4);
            font-weight: 600;
        }

        .small-btn {
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            padding: 0.4rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .small-btn:hover {
            background: var(--accent-primary);
            color: white;
        }

        .similarity-badge {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(16, 185, 129, 0.9);
            color: white;
            font-size: 0.7rem;
            text-align: center;
            padding: 2px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Modal active state */
        #detailModal.active {
            opacity: 1 !important;
            pointer-events: all !important;
        }
    </style>
</body>

</html>
